; PlatformIO Project Configuration File
; Targets: Arduino Pro Mini (ATmega328P)
;   - 5V / 16 MHz: pro16MHzatmega328
;   - 3.3V / 8 MHz: pro8MHzatmega328
; Build with:
;   pio run -e pro16MHzatmega328
;   pio run -e pro8MHzatmega328

[platformio]
default_envs = pro16MHzatmega328

[env]
platform  = atmelavr
framework = arduino

; The Servo library ships with the Arduino AVR framework.
; Listing it explicitly makes the dependency visible and reproducible.
lib_deps =
    arduino-libraries/Servo

[env:pro16MHzatmega328]
board     = pro16MHzatmega328

[env:pro8MHzatmega328]
board     = pro8MHzatmega328
